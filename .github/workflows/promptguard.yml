# Example consumer workflow: run PromptGuard on every PR and post the report
# as a sticky comment. This is the experience your buyers would copy-paste.
name: PromptGuard

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  promptguard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # While unpublished, build from source. Once on npm, replace these two
      # steps with: npx --yes promptguard-ci run --output promptguard-comment.md
      - run: npm ci
      - run: npm run build

      - name: Run PromptGuard
        id: pg
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node dist/cli.js run --output promptguard-comment.md
        continue-on-error: true

      - name: Post report comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('promptguard-comment.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const marker = 'Generated by PromptGuard CI';
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

      - name: Fail if the gate failed
        if: steps.pg.outcome == 'failure'
        run: |
          echo "PromptGuard gate failed — see the PR comment for details."
          exit 1
